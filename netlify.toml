# Netlify configuration for Norvex Sports
# Deploys the Next.js app as serverless functions on Netlify.

[build]
  command = "pnpm prisma generate && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # If you hit pnpm strict-build-script errors during install, this lets the
  # build proceed (we already approve specific scripts via .npmrc).
  NPM_FLAGS = "--prefer-offline"

# Official Next.js Runtime — handles SSR, ISR, image optimization, etc.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Bundle Prisma engine into the function package
  external_node_modules = ["@prisma/client", "prisma"]

# Optional: redirect www → apex (uncomment + adjust to your domain)
# [[redirects]]
#   from = "https://www.norvexsports.com/*"
#   to = "https://norvexsports.com/:splat"
#   status = 301
#   force = true
